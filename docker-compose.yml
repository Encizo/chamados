services:
  chamados-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chamados-app
    ports:
      - "5000:5000"
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      FLASK_DEBUG: "0"
    volumes:
      - ./data:/app/data
      - ./credenciais:/app/credenciais
      - ./.env:/app/.env
    restart: unless-stopped
